name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  host-test:
    name: Linux x86_64 host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build test fixture
        working-directory: tests
        run: |
          gcc -std=gnu11 -shared -fPIC -fvisibility=default \
            -o libtestfixture.so test_fixture.c -ldl -lpthread

      - name: build and run tests
        working-directory: tests
        run: |
          make -s && bash run_tests.sh

  avd-test:
    name: AVD API ${{ matrix.api-level }} ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [34]
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: setup gradle
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gradle

      - name: enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          echo "KVM available: $(ls -la /dev/kvm 2>&1)"

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          target: default
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            export ANDROID_HOME=/usr/local/lib/android/sdk
            echo "Android: $(adb shell getprop ro.build.version.release)"
            echo "ABI: $(adb shell getprop ro.product.cpu.abi)"

            cd tests/avd

            gradle :app:assembleDebug

            apk_path=$(find app/build/outputs -name '*.apk' 2>/dev/null | head -1)
            if [ -z "$apk_path" ]; then
                echo "FAIL: no APK found"
                find . -name '*.apk' 2>/dev/null
                exit 1
            fi
            echo "APK: $apk_path"

            adb install -r -g "$apk_path"

            adb shell am start -n com.raplt.test/.MainActivity
            sleep 8

            echo "=== Logcat ==="
            adb logcat -d -s RaPLT:V RaPLT-jni:V RaPLT-target:V | head -40
