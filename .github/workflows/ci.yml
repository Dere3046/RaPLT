name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  host-test:
    name: Linux x86_64 host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build test fixture
        working-directory: tests
        run: |
          gcc -std=gnu11 -shared -fPIC -fvisibility=default \
            -o libtestfixture.so test_fixture.c -ldl -lpthread

      - name: build and run tests
        working-directory: tests
        run: |
          make -s && bash run_tests.sh

  avd-test:
    name: AVD API ${{ matrix.api-level }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [34]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          echo "KVM available: $(ls -la /dev/kvm 2>&1)"

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: default
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            export ANDROID_HOME=/usr/local/lib/android/sdk
            echo "ANDROID_HOME=$ANDROID_HOME"
            echo "ABI: $(adb shell getprop ro.product.cpu.abi)"

            # build native test binary
            bash tests/avd/build.sh

            # push and run
            adb push tests/avd/libs/x86_64/test_raplt /data/local/tmp/
            adb shell chmod +x /data/local/tmp/test_raplt
            adb shell /data/local/tmp/test_raplt
            rc=$?
            echo "exit code: $rc"
            exit $rc
